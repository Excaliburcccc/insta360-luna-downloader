name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name Insta360LunaDownloader --paths src src/luna_downloader/main.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Insta360LunaDownloader-windows
          path: dist/Insta360LunaDownloader/**
